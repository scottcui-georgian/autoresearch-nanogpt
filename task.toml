[task]
name = "nanogpt"
files = ["train.py", "prepare.py"]
mutable = ["train.py"]

[task.entrypoints.train]
file = "train.py"
gpu = "L40S"
timeout = 1800

[task.entrypoints.prepare]
file = "prepare.py"
timeout = 3600
cpu = 8

[constraints]
time_budget = 300

[tracking]
db = "results.db"
exp_file = "exp.md"
legacy_exp_paths = ["autoresearch_runtime/exp.md"]
